  <!-- UTM PROPAGATION: Passa UTMs automaticamente para todos os links SharkPay -->
  <script>
  (function() {
    // 1. Remove fbclid da URL sem recarregar a página (limpeza pró-ativa)
    if (window.location.search.includes('fbclid')) {
      try {
        const url = new URL(window.location.href);
        url.searchParams.delete('fbclid');
        window.history.replaceState({}, '', url.toString());
      } catch (e) {}
    }

    const params = new URLSearchParams(window.location.search);
    const utms = ['utm_source', 'utm_medium', 'utm_campaign',
                  'utm_content', 'utm_term', 'sck'];

    // Função para limpar valores de UTM (evita concatenação com fbclid/IDs do FB)
    const cleanUtmValue = (val) => {
      if (!val) return '';
      // fbclid tem formato: jLj[hash] ou similar
      // Remove tudo após padrão de ID do Facebook (letra j seguida de hash de 16+ chars)
      const fbclidPattern = /j[A-Z][a-z][0-9a-f]{16,}/;
      return val.replace(fbclidPattern, '').split('?')[0].split('#')[0].trim();
    };

    // Salva UTMs no sessionStorage como backup (e recupera se URL não tiver)
    utms.forEach(utm => {
      let value = cleanUtmValue(params.get(utm));
      if (value) {
        sessionStorage.setItem(utm, value);
        params.set(utm, value); // Atualiza no objeto params atual
      } else {
        const saved = sessionStorage.getItem(utm);
        if (saved) params.set(utm, saved);
      }
    });

    // Função que adiciona UTMs em um link
    function addUtmsToLink(link) {
      try {
        if (!link.href || (!link.href.includes('sharckpay.vip') && !link.href.includes('sharkpay.vip'))) return;
        const url = new URL(link.href);
        utms.forEach(utm => {
          const value = params.get(utm);
          if (value) url.searchParams.set(utm, value);
        });
        link.href = url.toString();
      } catch(e) {}
    }

    // Aplica em todos os links do SharkPay já existentes na página
    function applyToAllLinks() {
      document.querySelectorAll(
        'a[href*="sharckpay.vip"], a[href*="sharkpay.vip"]'
      ).forEach(addUtmsToLink);
    }

    // Roda imediatamente e também após DOM estar pronto
    applyToAllLinks();
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', applyToAllLinks);
    }

    // Observa novos links adicionados dinamicamente (React renderiza async)
    const observer = new MutationObserver(function(mutations) {
      mutations.forEach(function(mutation) {
        mutation.addedNodes.forEach(function(node) {
          if (node.nodeType !== 1) return;
          if (node.tagName === 'A') {
            addUtmsToLink(node);
          }
          if (node.querySelectorAll) {
            node.querySelectorAll(
              'a[href*="sharckpay.vip"], a[href*="sharkpay.vip"]'
            ).forEach(addUtmsToLink);
          }
        });
      });
    });

    observer.observe(document.documentElement, {
      childList: true,
      subtree: true
    });

    // 🔴 DISPARO MANUAL DE INITIATECHECKOUT (Sem bloquear o clique)
    document.addEventListener('click', function(e) {
      const target = e.target.closest('a');
      if (target && (target.href.includes('sharckpay.vip') || target.href.includes('sharkpay.vip'))) {
        const utmify = window.Utmify || window.__utmify || window.utmify;
        if (utmify && utmify.track) {
          utmify.track('initiateCheckout', {
            value: 0,
            currency: 'BRL'
          });
          console.log("[UTMIFY] InitiateCheckout disparado via click listener");
        }
      }
    }, true);

  })();
  </script>
